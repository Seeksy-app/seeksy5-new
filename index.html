    <style>
      /* Dark base to match hero image — prevents FOUC flash */
      html, body, #root {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background-color: #ffffff;
      }
      /* Hide content until hero image is loaded */
      #root {
        opacity: 0;
        transition: opacity 0.25s ease-in;
      }
      #root.ready {
        opacity: 1;
      }
      /* Inline loading indicator */
      #initial-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #ffffff;
        transition: opacity 0.2s ease-out;
      }
      #initial-loader.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #initial-loader .dot {
        width: 8px;
        height: 8px;
        margin: 0 4px;
        border-radius: 50%;
        background-color: hsl(217, 91%, 60%);
        animation: dot-pulse 1s ease-in-out infinite;
      }
      #initial-loader .dot:nth-child(2) { animation-delay: 0.15s; }
      #initial-loader .dot:nth-child(3) { animation-delay: 0.3s; }
      @keyframes dot-pulse {
        0%, 100% { opacity: 0.3; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1); }
      }
    </style>
